<!DOCTYPE html>
<html>
<head>
<title>FO vs DDS Training</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: linear-gradient(to right, #1f2430, #2c3445);
  color: white;
  display: flex;
  flex-direction: column;
  align-items: center;
  margin: 0;
  padding-top: 40px;
}

h2 {
  margin-bottom: 10px;
}

#progress {
  margin-bottom: 15px;
  font-size: 14px;
  opacity: 0.8;
}

.card {
  width: 360px;
  height: 240px;
  perspective: 1000px;
  margin-bottom: 40px;
}

.card-inner {
  width: 100%;
  height: 100%;
  transition: transform 0.5s;
  transform-style: preserve-3d;
  position: relative;
}

.flipped {
  transform: rotateY(180deg);
}

.card-face {
  position: absolute;
  width: 100%;
  height: 100%;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  font-size: 18px;
  text-align: center;
  backface-visibility: hidden;
  box-shadow: 0 6px 16px rgba(0,0,0,0.3);
}

.front {
  background: #111;
  border: 2px solid #4a6cff;
  font-weight: bold;
}

.back {
  background: #4a6cff;
  transform: rotateY(180deg);
}

.controls {
  display: flex;
  gap: 12px;
  margin-bottom: 15px;
}

button {
  border: none;
  padding: 10px 16px;
  border-radius: 6px;
  cursor: pointer;
  color: white;
}

.nav { background-color: #4a6cff; }
.know { background: #2ecc71; }
.review { background: #e67e22; }
.mode { background: #9b59b6; }

#results {
  display: none;
  text-align: center;
}
</style>

</head>

<body>

<h2>FO vs DDS Training</h2>
<div id="progress"></div>

<button class="mode" onclick="toggleTestMode()" id="modeBtn">
🧠 Test Mode: OFF
</button>

<div class="card" onclick="flipCard()" id="cardContainer">
  <div class="card-inner" id="cardInner">
    <div class="card-face front" id="front"></div>
    <div class="card-face back" id="back"></div>
  </div>
</div>

<div class="controls">
  <button class="nav" onclick="prevCard()">Previous</button>
  <button class="nav" onclick="nextCard()">Next</button>
</div>

<div class="controls">
  <button class="know" onclick="markKnown()">✅ I Know This</button>
  <button class="review" onclick="markReview()">🔁 Review</button>
</div>

<div id="results">
  <h3>Training Complete 🎉</h3>
  <p id="score"></p>
  <button class="nav" onclick="restart()">Restart</button>
</div>

<script>
const flashcards = [
  {front: "FO Role", back: "Works directly with the public and handles claim intake and customer service"},
  {front: "DDS Role", back: "Works behind the scenes and determines medical eligibility"},
  {front: "FO Responsibilities", back: "Takes applications, conducts interviews, gathers non-medical info"},
  {front: "DDS Responsibilities", back: "Reviews medical records, orders exams, makes disability decisions"},
  {front: "FO Checks", back: "Income, resources, work history, insured status, living arrangements"},
  {front: "DDS Focus", back: "ONLY medical eligibility (disability determination)"},
  {front: "Interviews", back: "FO: Yes (phone/in person)\nDDS: No interviews"},
  {front: "Decision Type", back: "FO: Technical (non-medical)\nDDS: Medical decisions"},
  {front: "Case Flow", back: "FO starts claim → sends to DDS → DDS decides → returns to FO"},
  {front: "Simple Memory", back: "FO = talks to claimant & clears claim\nDDS = decides if disabled"}
];

let current = 0;
let known = 0;
let testMode = false;
let revealed = false;

function showCard() {
  document.getElementById("progress").textContent =
    `Card ${current + 1} of ${flashcards.length}`;

  document.getElementById("front").textContent = flashcards[current].front;
  document.getElementById("back").textContent =
    revealed || !testMode ? flashcards[current].back : "Click to reveal answer";
}

function flipCard() {
  if (testMode) {
    revealed = true;
    showCard();
  } else {
    document.getElementById("cardInner").classList.toggle("flipped");
  }
}

function nextCard() {
  current++;
  if (current >= flashcards.length) {
    showResults();
    return;
  }
  resetCard();
  showCard();
}

function prevCard() {
  current = Math.max(0, current - 1);
  resetCard();
  showCard();
}

function resetCard() {
  revealed = false;
  document.getElementById("cardInner").classList.remove("flipped");
}

function markKnown() {
  known++;
  nextCard();
}

function markReview() {
  nextCard();
}

function toggleTestMode() {
  testMode = !testMode;
  document.getElementById("modeBtn").textContent =
    testMode ? "🧠 Test Mode: ON" : "🧠 Test Mode: OFF";

  resetCard();
  showCard();
}

function showResults() {
  document.getElementById("cardContainer").style.display = "none";
  document.getElementById("progress").style.display = "none";
  document.querySelectorAll(".controls").forEach(el => el.style.display = "none");
  document.getElementById("modeBtn").style.display = "none";

  document.getElementById("results").style.display = "block";
  document.getElementById("score").textContent =
    `You knew ${known} out of ${flashcards.length}`;
}

function restart() {
  current = 0;
  known = 0;
  revealed = false;

  document.getElementById("cardContainer").style.display = "block";
  document.getElementById("progress").style.display = "block";
  document.querySelectorAll(".controls").forEach(el => el.style.display = "flex");
  document.getElementById("modeBtn").style.display = "inline-block";
  document.getElementById("results").style.display = "none";

  showCard();
}

showCard();
</script>

</body>
</html>
